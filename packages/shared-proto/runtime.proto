syntax = "proto3";

package helixrt;

enum SchedulerMode {
  FIFO = 0;
  ROUND_ROBIN = 1;
  PRIO = 2;
}

service RuntimeService {
  rpc StartRuntime (StartRequest) returns (StatusResponse);
  rpc StopRuntime (StopRequest) returns (StatusResponse);
  rpc StreamMetrics (StreamRequest) returns (stream RuntimeMetrics);
  rpc SetSchedulerMode (SetSchedulerRequest) returns (StatusResponse);
}

message SetSchedulerRequest {
  string runtime_id = 1;
  SchedulerMode mode = 2;
}

message StartRequest {
  string runtime_id = 1;
  int32 thread_count = 2;
}

message StopRequest {
  string runtime_id = 1;
}

message StreamRequest {
  string runtime_id = 1;
}

message StatusResponse {
  bool success = 1;
  string message = 2;
}

message RuntimeMetrics {
  string runtime_id = 1;
  int32 active_threads = 2;
  double throughput = 3;
  double latency = 4;
  double cpu_usage = 5;
  int64 timestamp = 6;

  int32 thread_id = 7;
  int32 task_id = 8;
  
  int32 queued_tasks = 9;
  int32 running_tasks = 10;
  int32 completed_tasks = 11;
}
