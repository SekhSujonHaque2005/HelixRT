services:
  # C++ Runtime Engine (Private Service)
  - type: worker
    name: helixrt-runtime
    env: docker
    dockerContext: .
    dockerfilePath: apps/runtime/Dockerfile
    # Render workers are private by default and can be reached by other services in the same group
    # We use 'worker' type for the gRPC server as it doesn't need a public HTTP port

  # Node.js Gateway (Web Service)
  - type: web
    name: helixrt-gateway
    env: docker
    dockerContext: .
    dockerfilePath: apps/gateway/Dockerfile
    plan: free
    healthCheckPath: /metrics/history # Using history endpoint as a basic health check
    envVars:
      - key: GRPC_HOST
        value: helixrt-runtime:50051
      - key: DATABASE_URL
        sync: false # User will provide the Neon DATABASE_URL manually in Render dashboard
      - key: PORT
        value: 4000
    # In Render, we can specify multiple ports if needed, but the main one is handled by Render
    # WebSockets usually work over the same port or specifically configured ones.
    # Note: Free tier on Render might spin down. If using WebSockets, it's better to stay active.
